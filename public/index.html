<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Final - Tic Tac Toe 3D</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
    <div id="bg-canvas-container"></div>

    <div id="lobby">
        <div class="lobby-card animate__animated animate__zoomIn">
            <h1>TIC TAC TOE <span>3D</span></h1>
            <input type="text" id="roomInput" placeholder="Código de Sala">
            <button id="joinBtn">CONECTAR COMPUTADORAS</button>
            
            <div id="student-credits">
                <p><strong>Estudiante:</strong> Kevin Dobras</p>
                <p><strong>Profesor:</strong> Euclides Serracin</p>
                <p><strong>Grupo:</strong> 1IL141 | Proyecto Final</p>
            </div>
        </div>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="top-bar">
            <div id="info-left"><span id="role-badge">P1</span> | <span id="room-id">SALA</span></div>
            <div id="turn-display">ESPERANDO...</div>
            <button id="exit-btn">SALIR AL MENÚ</button>
        </div>
        <div id="layers-container"></div>
        <div id="three-container">
            <button id="toggle-3d">_</button>
            <div id="three-canvas-target"></div>
        </div>
        <div id="coord-tooltip" class="hidden"></div>
    </div>

    <div id="overlay" class="hidden">
        <div class="modal animate__animated animate__bounceIn">
            <h2 id="result-message">¡GANASTE!</h2>
            <div class="modal-buttons">
                <button id="retry-btn">VOLVER A JUGAR</button>
                <button id="menu-btn">MENÚ PRINCIPAL</button>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden"></div>

    <audio id="snd-move" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" loop></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="client.js"></script>
</body>
</html>
